services:
  db:
    image: pgvector/pgvector:pg16
    container_name: findocbot-db
    environment:
      POSTGRES_DB: findocbot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./migrations/002_hnsw_index.sql:/docker-entrypoint-initdb.d/002_hnsw_index.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d findocbot"]
      interval: 5s
      timeout: 3s
      retries: 20

  ollama:
    image: ollama/ollama:latest
    container_name: findocbot-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 5
        for model in $$OLLAMA_MODELS; do
          echo "Pulling $$model ..."
          ollama pull "$$model"
        done
        wait
    environment:
      OLLAMA_MODELS: "qwen2.5:7b nomic-embed-text:latest"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: findocbot-api
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      POSTGRES_DSN: postgresql://postgres:postgres@db:5432/findocbot
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy

volumes:
  pgdata:
  ollama:
